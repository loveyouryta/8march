<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Поймай цветы</title>

<link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600;700&family=Lato:wght@300;400&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
  min-height:100vh;
  overflow:hidden;
  font-family:'Lato',sans-serif;
  background:linear-gradient(135deg,#fde6ec 0%,#f9cdd9 50%,#fff0f4 100%);
  color:#5a1e34;
  position:relative;
}

/* Декор углов как в main */
.corner{
  position:fixed;
  font-size:40px;
  opacity:.15;
  pointer-events:none;
}

.tl{top:10px;left:10px}
.tr{top:10px;right:10px}
.bl{bottom:10px;left:10px}
.br{bottom:10px;right:10px}

/* Заголовок */
.header{
  text-align:center;
  padding:60px 20px 20px;
}

h1{
  font-family:'Dancing Script',cursive;
  font-size:clamp(36px,6vw,60px);
}

.subtitle{
  margin-top:10px;
  font-style:italic;
  color:#8b4060;
}

/* Счётчик */
.counter{
  margin-top:25px;
  font-size:18px;
}

/* Падающие цветы */
.flower{
  position:absolute;
  font-size:42px;
  cursor:pointer;
  user-select:none;
  animation:fall linear forwards;
  transition:transform .2s;
}

.flower:hover{
  transform:scale(1.2);
}

@keyframes fall{
  from{ transform:translateY(-10vh); }
  to{ transform:translateY(110vh); }
}

/* Окно победы */
.win-screen{
  position:fixed;
  inset:0;
  background:rgba(255,255,255,0.6);
  backdrop-filter:blur(15px);
  -webkit-backdrop-filter:blur(15px);
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  opacity:0;
  pointer-events:none;
  transition:.4s ease;
}

.win-screen.show{
  opacity:1;
  pointer-events:auto;
}

.win-box{
  background:white;
  padding:40px 60px;
  border-radius:25px;
  box-shadow:0 15px 50px rgba(0,0,0,.1);
}

.win-box h2{
  font-family:'Dancing Script',cursive;
  font-size:36px;
  color:#e8526a;
}
</style>
</head>
<body>

<div class="corner tl">🌸</div>
<div class="corner tr">🌷</div>
<div class="corner bl">💐</div>
<div class="corner br">🌹</div>

<div class="header">
  <h1>Поймай 5 цветов 💖</h1>
  <p class="subtitle">Нажимай на падающие цветы</p>
  <div class="counter">
    Поймано: <span id="score">0</span> / 5
  </div>
</div>

<div class="win-screen" id="win">
  <div class="win-box">
    <h2>Ты справилась, зайка! 🌸</h2>
  </div>
</div>

<script>

const flowers = ["🌸","🌷","💐","🌹"];
let score = 0;
let gameOver = false;

function spawnFlower(){
  if(gameOver) return;

  const el = document.createElement("div");
  el.classList.add("flower");
  el.innerText = flowers[Math.floor(Math.random()*flowers.length)];

  el.style.left = Math.random()*95 + "vw";
  el.style.animationDuration = (3 + Math.random()*2) + "s";

  el.addEventListener("click",()=>{
    if(gameOver) return;

    el.remove();
    score++;
    document.getElementById("score").innerText = score;

    if(score >= 5){
      winGame();
    }
  });

  document.body.appendChild(el);

  setTimeout(()=>{ el.remove(); },6000);
}

function winGame(){
  gameOver = true;
  document.getElementById("win").classList.add("show");

  setTimeout(()=>{
    window.location.href = "main.html";
  },2000);
}

setInterval(spawnFlower,900);

</script>

</body>
</html>
